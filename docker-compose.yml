# 🏙️ Urban Stress ML - Development Environment\nversion: '3.8'\n\nservices:\n  # Backend API Service\n  urban-stress-api:\n    build:\n      context: .\n      dockerfile: Dockerfile\n    ports:\n      - \"5000:5000\"\n    environment:\n      - FLASK_ENV=development\n      - FLASK_DEBUG=1\n    volumes:\n      - ./backend:/app/backend\n      - ./best_model.pkl:/app/best_model.pkl\n    depends_on:\n      - redis\n      - postgres\n    networks:\n      - urban-stress-network\n    healthcheck:\n      test: [\"CMD\", \"curl\", \"-f\", \"http://localhost:5000/info\"]\n      interval: 30s\n      timeout: 10s\n      retries: 3\n\n  # Redis for caching predictions\n  redis:\n    image: redis:7-alpine\n    ports:\n      - \"6379:6379\"\n    volumes:\n      - redis_data:/data\n    networks:\n      - urban-stress-network\n    healthcheck:\n      test: [\"CMD\", \"redis-cli\", \"ping\"]\n      interval: 10s\n      timeout: 5s\n      retries: 3\n\n  # PostgreSQL for storing prediction logs\n  postgres:\n    image: postgres:15-alpine\n    environment:\n      POSTGRES_DB: urban_stress\n      POSTGRES_USER: urban_user\n      POSTGRES_PASSWORD: urban_pass\n    ports:\n      - \"5432:5432\"\n    volumes:\n      - postgres_data:/var/lib/postgresql/data\n      - ./init.sql:/docker-entrypoint-initdb.d/init.sql\n    networks:\n      - urban-stress-network\n    healthcheck:\n      test: [\"CMD-SHELL\", \"pg_isready -U urban_user -d urban_stress\"]\n      interval: 10s\n      timeout: 5s\n      retries: 3\n\n  # Frontend Development Server\n  urban-stress-frontend:\n    build:\n      context: ./frontend\n      dockerfile: Dockerfile.dev\n    ports:\n      - \"3000:3000\"\n    volumes:\n      - ./frontend/src:/app/src\n      - ./frontend/public:/app/public\n    environment:\n      - REACT_APP_API_URL=http://localhost:5000\n    depends_on:\n      - urban-stress-api\n    networks:\n      - urban-stress-network\n\n  # Monitoring with Prometheus\n  prometheus:\n    image: prom/prometheus:latest\n    ports:\n      - \"9090:9090\"\n    volumes:\n      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml\n      - prometheus_data:/prometheus\n    command:\n      - '--config.file=/etc/prometheus/prometheus.yml'\n      - '--storage.tsdb.path=/prometheus'\n      - '--web.console.libraries=/etc/prometheus/console_libraries'\n      - '--web.console.templates=/etc/prometheus/consoles'\n    networks:\n      - urban-stress-network\n\n  # Grafana for dashboards\n  grafana:\n    image: grafana/grafana:latest\n    ports:\n      - \"3001:3000\"\n    environment:\n      - GF_SECURITY_ADMIN_PASSWORD=admin\n    volumes:\n      - grafana_data:/var/lib/grafana\n      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards\n      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources\n    depends_on:\n      - prometheus\n    networks:\n      - urban-stress-network\n\nvolumes:\n  redis_data:\n  postgres_data:\n  prometheus_data:\n  grafana_data:\n\nnetworks:\n  urban-stress-network:\n    driver: bridge